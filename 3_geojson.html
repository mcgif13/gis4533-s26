<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duluth School Attendance Areas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #222;
        }

        body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            max-width: 960px;
            width: 100%;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.6rem;
            letter-spacing: -0.04em;
        }

        .header h3 {
            margin: 8px 0 0;
            font-weight: 400;
            color: #555;
        }

        .description {
            max-width: 960px;
            width: 100%;
            margin-bottom: 24px;
            background: #ffffff;
            padding: 18px 22px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            line-height: 1.7;
            font-size: 1rem;
        }

        #map {
            width: 100%;
            max-width: 960px;
            height: 620px;
            border: 4px solid #4a90e2;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.14);
        }
    </style>
</head>
<body>
    <!-- Header at the top of the page -->
    <div class="header">
        <h1>Duluth School Attendance Areas</h1>
        <h3>by: [Emilia McGiffert]</h3>
    </div>
    <p class="description">
        This map shows the school attendance areas for Duluth Public Schools. Click on an area to see the schools within it.
        Data source: Minnesota Department of Education via MnGeoCommons.
    </p>

    <div id="map"></div>
    
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map, center it on Duluth, and set the zoom level to show all areas
        const map = L.map('map').setView([46.7867, -92.1005], 11);

        // Add a subdued basemap (CartoDB Positron)
        const tiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Function to generate random colors for styling the GeoJSON features
        function getRandomColor() {
            return '#' + Math.floor(Math.random()*16777215).toString(16);
        }

        // Function to style the GeoJSON features with random colors
        function style(feature) {
            return {
                fillColor: getRandomColor(),
                weight: 2,
                opacity: 1,
                color: 'white',
                dashArray: '3',
                fillOpacity: 0.7
            };
        }

        // Function to create popups for each feature
        function onEachFeature(feature, layer) {
            if (feature.properties && feature.properties.schools) {
                layer.bindPopup('<b>Schools:</b><br>' + feature.properties.schools.join('<br>'));
            }
        }

        // Load GeoJSON data for school attendance areas
        fetch("attendance_areas.geojson.json")
            .then(response => response.json())
            .then(data => {
                // Add GeoJSON layer to the map with the specified style and popups
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: onEachFeature
                }).addTo(map);
            })
            .catch(error => console.error('Error loading GeoJSON:', error));
    </script>
</body>
</html>
    </script>
</body>
</html>
